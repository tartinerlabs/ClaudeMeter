name: Auto Release

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'appcast.xml'
      - 'Config/Version.xcconfig'
      - '.beads/**'
      - '.claude/**'
      - '.github/**'
      - '.gitignore'
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        type: choice
        options: [auto, patch, minor, major]
        default: auto
      dry_run:
        description: 'Compute version and notes without releasing'
        type: boolean
        default: false

concurrency:
  group: auto-release
  cancel-in-progress: false

env:
  APP_NAME: ClaudeMeter
  SCHEME: ClaudeMeter
  SPARKLE_VERSION: "2.8.1"

jobs:
  release:
    runs-on: macos-26
    if: github.actor != 'github-actions[bot]'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Always release from the tip of main, not the triggering SHA: a run
          # queued behind another release must see that release's bump commit.
          ref: main
          fetch-depth: 0

      - name: Compute version and release notes
        id: version
        env:
          BUMP_INPUT: ${{ inputs.bump || 'auto' }}
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 --match 'v*')
          RANGE="$LAST_TAG..HEAD"

          if git log -1 --format='%B' | grep -qF '[skip release]'; then
            echo "Head commit requests [skip release]; skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          NOTES=$(git log "$RANGE" --no-merges --format='%s' \
            | grep -vE '^(Update appcast for v|Bump version to |Update beads)' \
            | grep -vF '[skip release]' \
            | sed -E 's/ *\[(minor|major)\]//g' \
            | sed 's/^/- /')
          if [ -z "$NOTES" ]; then
            echo "No release-worthy commits since $LAST_TAG; skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BUMP="$BUMP_INPUT"
          if [ "$BUMP" = "auto" ]; then
            LOG=$(git log "$RANGE" --no-merges --format='%s %b')
            if echo "$LOG" | grep -qiF '[major]'; then BUMP=major
            elif echo "$LOG" | grep -qiF '[minor]'; then BUMP=minor
            else BUMP=patch
            fi
          fi

          IFS=. read -r MAJ MIN PAT <<<"${LAST_TAG#v}"
          case "$BUMP" in
            major) VERSION="$((MAJ + 1)).0.0" ;;
            minor) VERSION="$MAJ.$((MIN + 1)).0" ;;
            patch) VERSION="$MAJ.$MIN.$((PAT + 1))" ;;
          esac

          if git rev-parse -q --verify "refs/tags/v$VERSION" >/dev/null; then
            echo "::error::Tag v$VERSION already exists"
            exit 1
          fi

          # Resume guard: a previous run pushed the bump commit but failed
          # before creating the release. Reuse the committed version.
          CURRENT_MARKETING=$(grep 'MARKETING_VERSION' Config/Version.xcconfig | cut -d'=' -f2 | tr -d ' ')
          RESUME=false
          if [ "$CURRENT_MARKETING" = "$VERSION" ]; then
            echo "xcconfig already at $VERSION with no tag; resuming a previously failed release."
            RESUME=true
            BUILD=$(grep 'CURRENT_PROJECT_VERSION' Config/Version.xcconfig | cut -d'=' -f2 | tr -d ' ')
          else
            BUILD=$(($(grep 'CURRENT_PROJECT_VERSION' Config/Version.xcconfig | cut -d'=' -f2 | tr -d ' ') + 1))
          fi

          {
            echo "skip=false"
            echo "resume=$RESUME"
            echo "version=$VERSION"
            echo "tag=v$VERSION"
            echo "build_number=$BUILD"
            echo "last_tag=$LAST_TAG"
            echo "notes<<NOTES_EOF"
            echo "$NOTES"
            echo "NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

          echo "Releasing $VERSION (build $BUILD, $BUMP bump from $LAST_TAG):"
          echo "$NOTES"

      - name: Run tests
        if: steps.version.outputs.skip != 'true'
        run: |
          xcodebuild -project ${{ env.APP_NAME }}.xcodeproj \
            -scheme ${{ env.SCHEME }} \
            test

      - name: Bump version and update changelog
        if: steps.version.outputs.skip != 'true' && steps.version.outputs.resume != 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
          BUILD: ${{ steps.version.outputs.build_number }}
          LAST_TAG: ${{ steps.version.outputs.last_tag }}
          NOTES: ${{ steps.version.outputs.notes }}
        run: |
          sed -i '' "s/^MARKETING_VERSION = .*/MARKETING_VERSION = $VERSION/" Config/Version.xcconfig
          sed -i '' "s/^CURRENT_PROJECT_VERSION = .*/CURRENT_PROJECT_VERSION = $BUILD/" Config/Version.xcconfig
          sed -i '' "s/MARKETING_VERSION = .*;/MARKETING_VERSION = $VERSION;/g" ${{ env.APP_NAME }}.xcodeproj/project.pbxproj
          sed -i '' "s/CURRENT_PROJECT_VERSION = .*;/CURRENT_PROJECT_VERSION = $BUILD;/g" ${{ env.APP_NAME }}.xcodeproj/project.pbxproj

          DATE=$(date +%F)
          awk -v ver="$VERSION" -v date="$DATE" '
            /^## \[Unreleased\]$/ { print; print ""; printf "## [%s] - %s\n\n%s\n", ver, date, ENVIRON["NOTES"]; next }
            { print }' CHANGELOG.md > CHANGELOG.md.tmp && mv CHANGELOG.md.tmp CHANGELOG.md
          awk -v ver="$VERSION" -v last="$LAST_TAG" -v repo="${{ github.repository }}" '
            /^\[Unreleased\]: / { printf "[Unreleased]: https://github.com/%s/compare/v%s...HEAD\n[%s]: https://github.com/%s/compare/%s...v%s\n", repo, ver, ver, repo, last, ver; next }
            { print }' CHANGELOG.md > CHANGELOG.md.tmp && mv CHANGELOG.md.tmp CHANGELOG.md

      - name: Dry-run report
        if: steps.version.outputs.skip != 'true' && inputs.dry_run == true
        env:
          VERSION: ${{ steps.version.outputs.version }}
          BUILD: ${{ steps.version.outputs.build_number }}
          NOTES: ${{ steps.version.outputs.notes }}
        run: |
          {
            echo "## Dry run: would release $VERSION (build $BUILD)"
            echo ""
            echo "$NOTES"
          } >> "$GITHUB_STEP_SUMMARY"
          git diff

      - name: Commit version bump
        if: steps.version.outputs.skip != 'true' && steps.version.outputs.resume != 'true' && inputs.dry_run != true
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Config/Version.xcconfig ${{ env.APP_NAME }}.xcodeproj/project.pbxproj CHANGELOG.md
          git commit -m "Bump version to $VERSION"
          for i in 1 2 3; do
            if git push origin HEAD:main; then break; fi
            if [ "$i" = 3 ]; then
              echo "::error::Failed to push version bump after 3 attempts"
              exit 1
            fi
            git pull --rebase origin main
          done

      - name: Build and archive
        if: steps.version.outputs.skip != 'true' && inputs.dry_run != true
        run: |
          xcodebuild -project ${{ env.APP_NAME }}.xcodeproj \
            -scheme ${{ env.SCHEME }} \
            -configuration Release \
            -archivePath build/${{ env.APP_NAME }}.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO

      - name: Export app
        if: steps.version.outputs.skip != 'true' && inputs.dry_run != true
        run: |
          mkdir -p build/export
          cp -R "build/${{ env.APP_NAME }}.xcarchive/Products/Applications/${{ env.APP_NAME }}.app" build/export/
          # Re-sign with ad-hoc signature to ensure valid code signature
          codesign --force --deep --sign - "build/export/${{ env.APP_NAME }}.app"
          # Verify the signature is valid
          codesign --verify --deep --strict "build/export/${{ env.APP_NAME }}.app"

      - name: Create zip
        if: steps.version.outputs.skip != 'true' && inputs.dry_run != true
        run: |
          cd build/export
          zip -r -y ../${{ env.APP_NAME }}.zip ${{ env.APP_NAME }}.app

      - name: Create GitHub release
        if: steps.version.outputs.skip != 'true' && inputs.dry_run != true
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
          NOTES: ${{ steps.version.outputs.notes }}
        run: |
          {
            echo "## What's New"
            echo ""
            echo "$NOTES"
            echo ""
            echo "See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for full details."
          } > /tmp/release-notes.md
          FLAGS=""
          case "$VERSION" in 0.*) FLAGS="--prerelease" ;; esac
          # gh release create makes the tag at --target itself, so a tag only
          # ever exists once the build has succeeded and the zip is attached.
          gh release create "$TAG" "build/${{ env.APP_NAME }}.zip#${{ env.APP_NAME }}.zip" \
            --target "$(git rev-parse HEAD)" \
            --title "${{ env.APP_NAME }} $VERSION" \
            --notes-file /tmp/release-notes.md $FLAGS

      - name: Download Sparkle
        if: steps.version.outputs.skip != 'true' && inputs.dry_run != true
        run: |
          curl -L -o sparkle.tar.xz "https://github.com/sparkle-project/Sparkle/releases/download/${{ env.SPARKLE_VERSION }}/Sparkle-${{ env.SPARKLE_VERSION }}.tar.xz"
          mkdir -p sparkle
          tar -xf sparkle.tar.xz -C sparkle

      - name: Sign update and generate appcast
        if: steps.version.outputs.skip != 'true' && inputs.dry_run != true
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
          VERSION: ${{ steps.version.outputs.version }}
          BUILD: ${{ steps.version.outputs.build_number }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          if [ -n "$SPARKLE_PRIVATE_KEY" ]; then
            # Sign the zip with EdDSA and build the appcast item by hand:
            # generate_appcast expects all archives in one directory, which
            # doesn't fit per-tag GitHub release download URLs.
            # sign_update outputs: sparkle:edSignature="..." length="..."
            SIGN_OUTPUT=$(echo "$SPARKLE_PRIVATE_KEY" | ./sparkle/bin/sign_update build/${{ env.APP_NAME }}.zip --ed-key-file -)
            echo "sign_update output: $SIGN_OUTPUT"
            SIGNATURE=$(echo "$SIGN_OUTPUT" | sed -n 's/.*sparkle:edSignature="\([^"]*\)".*/\1/p')
            if [ -z "$SIGNATURE" ]; then
              echo "::error::Failed to extract signature from sign_update output"
              exit 1
            fi
            echo "Extracted signature: $SIGNATURE"
            FILE_SIZE=$(stat -f%z build/${{ env.APP_NAME }}.zip)
            DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/$TAG/${{ env.APP_NAME }}.zip"
            PUB_DATE=$(date -R)

            # Convert the release notes markdown to basic HTML for Sparkle display
            RELEASE_HTML=$(cat /tmp/release-notes.md | sed \
              -e 's/^## \(.*\)/<h2>\1<\/h2>/' \
              -e 's/^### \(.*\)/<h3>\1<\/h3>/' \
              -e 's/^- \(.*\)/<li>\1<\/li>/' \
              -e 's/\[\([^]]*\)\](\([^)]*\))/<a href="\2">\1<\/a>/g' \
              | awk 'BEGIN{in_list=0} /<li>/{if(!in_list){print "<ul>"; in_list=1}} !/<li>/&&in_list{print "</ul>"; in_list=0} {print} END{if(in_list)print "</ul>"}')

            {
              echo '<?xml version="1.0" encoding="utf-8"?>'
              echo '<rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" xmlns:dc="http://purl.org/dc/elements/1.1/">'
              echo '    <channel>'
              echo '        <title>ClaudeMeter Updates</title>'
              echo "        <link>https://github.com/${{ github.repository }}/releases</link>"
              echo '        <description>Most recent updates to ClaudeMeter</description>'
              echo '        <language>en</language>'
              echo '        <item>'
              echo "            <title>Version ${VERSION}</title>"
              echo "            <pubDate>${PUB_DATE}</pubDate>"
              echo "            <sparkle:version>${BUILD}</sparkle:version>"
              echo "            <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>"
              echo '            <sparkle:minimumSystemVersion>14.0</sparkle:minimumSystemVersion>'
              echo '            <description><![CDATA['
              echo "${RELEASE_HTML}"
              echo '            ]]></description>'
              echo '            <enclosure'
              echo "                url=\"${DOWNLOAD_URL}\""
              echo "                length=\"${FILE_SIZE}\""
              echo '                type="application/octet-stream"'
              echo "                sparkle:edSignature=\"${SIGNATURE}\" />"
              echo '        </item>'
              echo '    </channel>'
              echo '</rss>'
            } > appcast.xml
          else
            echo "::warning::SPARKLE_PRIVATE_KEY secret not set. Skipping signing."
          fi

      - name: Commit updated appcast
        if: steps.version.outputs.skip != 'true' && inputs.dry_run != true
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          # Publishing the appcast is the final, user-visible release act; the
          # zip is already downloadable, so Sparkle never sees a dead link.
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add appcast.xml
          if git diff --staged --quiet; then
            echo "appcast.xml unchanged; nothing to commit."
            exit 0
          fi
          git commit -m "Update appcast for $TAG"
          for i in 1 2 3; do
            if git push origin HEAD:main; then break; fi
            if [ "$i" = 3 ]; then
              echo "::error::Failed to push appcast after 3 attempts"
              exit 1
            fi
            git pull --rebase origin main
          done
